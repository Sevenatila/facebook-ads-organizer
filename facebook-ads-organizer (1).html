<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contas Pagas — Facebook Ads</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0d11;
  --surface: #13151c;
  --surface2: #1a1d27;
  --surface3: #21253200;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --text: #e8e9ef;
  --muted: #5a6070;
  --muted2: #8891a0;
  --accent: #3ddc84;
  --accent-dim: rgba(61,220,132,0.10);
  --accent-border: rgba(61,220,132,0.20);
  --blue: #5b9cf6;
  --blue-dim: rgba(91,156,246,0.10);
  --blue-border: rgba(91,156,246,0.20);
  --yellow: #f5c542;
  --yellow-dim: rgba(245,197,66,0.10);
  --red: #f07070;
  --font: 'Syne', sans-serif;
  --mono: 'DM Mono', monospace;
  --r: 10px;
  --rlg: 14px;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.brand { display: flex; align-items: center; gap: 11px; }
.brand-dot {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--accent-dim); border: 1px solid var(--accent-border);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.brand-name { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
.brand-desc { font-size: 11px; color: var(--muted2); font-family: var(--mono); margin-top: 1px; }
.hdr-right { display: flex; gap: 8px; }

/* ── Buttons ── */
.btn {
  font-family: var(--font); font-size: 13px; font-weight: 500;
  border: none; border-radius: 8px; cursor: pointer;
  padding: 8px 16px; transition: all .15s;
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #051a0d; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.btn-sm { font-size: 12px; padding: 6px 12px; }
.btn-xs { font-size: 11px; padding: 4px 9px; border-radius: 6px; }

/* ── Layout ── */
.main { max-width: 1040px; margin: 0 auto; padding: 26px 32px; }

/* ── Summary cards ── */
.sum-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr)); gap: 10px; margin-bottom: 26px; }
.sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rlg); padding: 14px 18px; }
.sum-lbl { font-size: 10px; font-family: var(--mono); color: var(--muted2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
.sum-val { font-size: 20px; font-weight: 700; font-family: var(--mono); letter-spacing: -.4px; }
.sum-val.g { color: var(--accent); }
.sum-val.b { color: var(--blue); }
.sum-val.y { color: var(--yellow); }
.sum-sub { font-size: 11px; color: var(--muted2); font-family: var(--mono); margin-top: 4px; }

/* ── Toolbar ── */
.toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
.search {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text); font-family: var(--mono);
  font-size: 13px; padding: 8px 14px; outline: none; width: 230px;
  transition: border-color .15s;
}
.search:focus { border-color: var(--accent-border); }
.fsel {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text); font-family: var(--mono);
  font-size: 12px; padding: 8px 12px; outline: none; cursor: pointer;
  max-width: 200px;
}
.fsel:focus { border-color: var(--accent-border); }
.fsel option { background: var(--surface2); }
.tcnt { font-size: 11px; color: var(--muted2); font-family: var(--mono); }

/* ── Day block ── */
.day-block { margin-bottom: 10px; }
.day-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2px 10px;
}
.day-hdr-l { display: flex; align-items: center; gap: 10px; }
.day-pill {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 4px 14px;
  font-size: 12px; font-family: var(--mono); color: var(--text); font-weight: 500;
}
.day-meta { font-size: 11px; color: var(--muted2); font-family: var(--mono); }
.day-total { font-size: 15px; font-weight: 700; font-family: var(--mono); color: var(--accent); }
.day-total-lbl { font-size: 10px; color: var(--muted2); font-family: var(--mono); text-transform: uppercase; letter-spacing: .7px; margin-right: 6px; }

/* ── Account block within day ── */
.acct-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rlg);
  margin-bottom: 8px;
  overflow: hidden;
}
.acct-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.acct-hdr-l { display: flex; align-items: center; gap: 10px; }
.bm-tag {
  display: inline-block; background: var(--blue-dim); color: var(--blue);
  border: 1px solid var(--blue-border);
  border-radius: 5px; font-size: 10px; font-family: var(--mono);
  padding: 2px 8px; max-width: 230px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.acct-name { font-size: 13px; font-weight: 600; }
.acct-id { font-size: 11px; color: var(--muted2); font-family: var(--mono); }
.acct-subtotal {
  font-size: 13px; font-weight: 600; font-family: var(--mono); color: var(--accent);
  display: flex; align-items: center; gap: 10px;
}
.acct-subtotal-lbl { font-size: 10px; color: var(--muted2); font-family: var(--mono); text-transform: uppercase; letter-spacing: .7px; }

/* ── Payment rows ── */
.payments { padding: 0; }
.pay-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 16px;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
  font-size: 13px;
}
.pay-row:last-child { border-bottom: none; }
.pay-row:hover { background: rgba(255,255,255,0.025); }
.pay-bullet { color: var(--muted2); font-family: var(--mono); margin-right: 8px; font-size: 11px; }
.pay-idx { font-size: 11px; color: var(--muted2); font-family: var(--mono); min-width: 24px; }
.pay-val { font-family: var(--mono); font-weight: 600; color: var(--accent); }
.pay-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
.pay-row:hover .pay-actions { opacity: 1; }

/* ── Day separator ── */
.day-sep { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

/* ── Grand total row ── */
.grand-total-bar {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--rlg);
  padding: 16px 22px;
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 24px;
}
.grand-total-lbl { font-size: 12px; font-family: var(--mono); color: var(--muted2); text-transform: uppercase; letter-spacing: .8px; }
.grand-total-val { font-size: 22px; font-weight: 700; font-family: var(--mono); color: var(--accent); letter-spacing: -.5px; }

/* ── Empty ── */
.empty { text-align: center; padding: 50px 20px; color: var(--muted2); font-size: 14px; }
.empty b { color: var(--text); }

/* ── Modal ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--rlg); width: 100%; max-width: 520px;
  max-height: 92vh; overflow-y: auto; padding: 24px;
}
.modal-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
.paste-box { background: var(--surface2); border: 1px dashed var(--border2); border-radius: var(--r); padding: 13px 15px; margin-bottom: 16px; }
.paste-lbl { font-size: 10px; font-family: var(--mono); color: var(--muted2); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 7px; }
.paste-box textarea {
  width: 100%; background: transparent; border: none; color: var(--text);
  font-family: var(--mono); font-size: 12px; line-height: 1.6;
  resize: vertical; outline: none; min-height: 80px;
}
.fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
.fgrid .full { grid-column: 1/-1; }
.field label { display: block; font-size: 10px; font-family: var(--mono); color: var(--muted2); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 5px; }
.field input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px; color: var(--text); font-family: var(--mono);
  font-size: 13px; padding: 8px 12px; outline: none;
}
.field input:focus { border-color: var(--accent-border); }
.vals-section { margin-top: 14px; }
.vals-lbl { font-size: 10px; font-family: var(--mono); color: var(--muted2); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 8px; }
.val-row { display: flex; gap: 8px; align-items: center; margin-bottom: 7px; }
.val-row input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-family: var(--mono); font-size: 13px; padding: 7px 11px; outline: none; flex: 1; }
.val-row input:focus { border-color: var(--accent-border); }
.val-row .btn-xs { flex-shrink: 0; color: var(--red); border-color: rgba(240,112,112,.2); }
.modal-foot { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; padding-top: 15px; border-top: 1px solid var(--border); }

.filter-bar {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--rlg); padding: 14px 18px;
  margin-bottom: 18px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
}
.filter-bar-label { font-size: 10px; font-family: var(--mono); color: var(--muted2); text-transform: uppercase; letter-spacing: .8px; white-space: nowrap; }
.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  border-radius: 20px; padding: 5px 14px; cursor: pointer;
  border: 1px solid var(--border2); background: var(--surface2); color: var(--muted2);
  transition: all .15s; white-space: nowrap;
}
.chip:hover { border-color: var(--accent-border); color: var(--text); }
.chip.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.date-range { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.date-range input {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px; color: var(--text); font-family: var(--mono);
  font-size: 12px; padding: 6px 10px; outline: none; width: 132px;
}
.date-range input:focus { border-color: var(--accent-border); }
.date-range span { font-size: 11px; color: var(--muted2); font-family: var(--mono); }
.filter-result {
  width: 100%; margin-top: 4px; padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.fr-item { display: flex; flex-direction: column; gap: 2px; }
.fr-lbl { font-size: 10px; font-family: var(--mono); color: var(--muted2); text-transform: uppercase; letter-spacing: .7px; }
.fr-val { font-size: 15px; font-weight: 700; font-family: var(--mono); color: var(--accent); }
.fr-sub { font-size: 11px; font-family: var(--mono); color: var(--muted2); }
.fr-divider { width: 1px; height: 30px; background: var(--border2); }

@media(max-width:640px){
  .main { padding: 16px 14px; }
  .header { padding: 13px 14px; }
  .fgrid { grid-template-columns: 1fr; }
  .sum-grid { grid-template-columns: 1fr 1fr; }
  .day-hdr { flex-wrap: wrap; gap: 6px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-dot">✅</div>
    <div>
      <div class="brand-name">Contas Pagas — Facebook Ads</div>
      <div class="brand-desc">Por dia · totais automáticos</div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">↓ CSV</button>
    <button class="btn btn-primary btn-sm" onclick="openModal()">+ Adicionar</button>
  </div>
</div>

<div class="main">
  <div class="sum-grid" id="sumGrid"></div>
  <!-- Date filter bar -->
  <div class="filter-bar">
    <span class="filter-bar-label">Período</span>
    <div class="filter-chips">
      <span class="chip active" onclick="setChip('all',this)">Todos</span>
      <span class="chip" onclick="setChip('today',this)">Hoje</span>
      <span class="chip" onclick="setChip('yesterday',this)">Ontem</span>
      <span class="chip" onclick="setChip('7d',this)">Últimos 7 dias</span>
      <span class="chip" onclick="setChip('30d',this)">Últimos 30 dias</span>
      <span class="chip" id="chip-custom" onclick="setChip('custom',this)">Personalizado</span>
    </div>
    <div class="date-range" id="customRange" style="display:none">
      <input type="date" id="dtFrom" onchange="render()">
      <span>→</span>
      <input type="date" id="dtTo" onchange="render()">
    </div>
    <div class="filter-result" id="filterResult"></div>
  </div>

  <div class="toolbar">
    <input class="search" id="q" type="text" placeholder="Buscar..." oninput="render()">
    <select class="fsel" id="selBM" onchange="onBMChange()">
      <option value="">Todas as empresas</option>
    </select>
    <select class="fsel" id="selConta" onchange="render()">
      <option value="">Todas as contas</option>
    </select>
    <span class="tcnt" id="tcnt"></span>
  </div>
  <div id="body"></div>
</div>

<!-- Modal -->
<div class="overlay" id="ov" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="mtitle">Nova cobrança</div>

    <div class="paste-box">
      <div class="paste-lbl">📋 Colar texto do Facebook Ads</div>
      <textarea id="pasteRaw" placeholder="Cole o bloco completo do Facebook aqui (BM, conta, datas e valores)..."></textarea>
      <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="parsePaste()">✨ Interpretar</button>
        <span style="font-size:11px;color:var(--muted2);font-family:var(--mono)">preenche tudo automaticamente</span>
      </div>
    </div>

    <div class="fgrid">
      <div class="field full"><label>BM (Business Manager)</label><input id="fBM" placeholder="BM - Nome da BM"></div>
      <div class="field full"><label>Conta de anúncios</label><input id="fConta" placeholder="Ex: MKT Magazzi 4"></div>
      <div class="field full"><label>ID da conta</label><input id="fID" placeholder="Ex: 165145608890100"></div>
    </div>

    <div class="vals-section">
      <div class="vals-lbl">Cobranças (data + valor)</div>
      <div id="valRows"></div>
      <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="addValRow()">+ Adicionar linha</button>
    </div>

    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveModal()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ─── Storage key ─────────────────────────────────────────
const KEY = 'fbads_v6';

// ─── Data model: flat payment records ────────────────────
// { id, bm, contaNome, contaId, date, dateKey, valor }
let records = JSON.parse(localStorage.getItem(KEY) || 'null');

// ─── Month map (full + abbrev PT) ────────────────────────
const MO = {
  jan:1, fev:2, mar:3, abr:4, mai:5, jun:6,
  jul:7, ago:8, set:9, out:10, nov:11, dez:12,
  janeiro:1, fevereiro:2, março:3, marco:3, abril:4, maio:5, junho:6,
  julho:7, agosto:8, setembro:9, outubro:10, novembro:11, dezembro:12
};

function dateKey(str) {
  if (!str) return '9999-99-99';
  const m = str.toLowerCase().replace('ç','c').match(/(\d{1,2})\s+de\s+(\w+)\s+de\s+(\d{4})/);
  if (!m) return str.toLowerCase();
  const mon = MO[m[2]] || MO[m[2].slice(0,3)] || 0;
  return `${m[3]}-${String(mon).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
}

function parseBRL(s) {
  if (!s) return 0;
  return parseFloat(String(s).replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.')) || 0;
}
function fmtBRL(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function persist() { localStorage.setItem(KEY, JSON.stringify(records)); }

// ─── Seed data ───────────────────────────────────────────
function seedData() {
  const bm = 'BM - Yj Participacoes E Servicos Ltda';
  const rows = [
    // Magazzi 4
    [bm,'MKT Magazzi 4','165145608890100','29 de março de 2026','13204.64'],
    [bm,'MKT Magazzi 4','165145608890100','01 de abril de 2026','13718.13'],
    [bm,'MKT Magazzi 4','165145608890100','02 de abril de 2026','2784.00'],
    [bm,'MKT Magazzi 4','165145608890100','02 de abril de 2026','8378.40'],
    [bm,'MKT Magazzi 4','165145608890100','02 de abril de 2026','8353.99'],
    [bm,'MKT Magazzi 4','165145608890100','03 de abril de 2026','5003.04'],
    [bm,'MKT Magazzi 4','165145608890100','03 de abril de 2026','4431.00'],
    // Magazzi 2
    [bm,'MKT Magazzi 2','317155313215000','30 de março de 2026','1594.53'],
    [bm,'MKT Magazzi 2','317155313215000','30 de março de 2026','3189.03'],
    [bm,'MKT Magazzi 2','317155313215000','30 de março de 2026','1594.51'],
    [bm,'MKT Magazzi 2','317155313215000','30 de março de 2026','12756.14'],
    [bm,'MKT Magazzi 2','317155313215000','31 de março de 2026','400.55'],
    [bm,'MKT Magazzi 2','317155313215000','31 de março de 2026','1602.19'],
    [bm,'MKT Magazzi 2','317155313215000','01 de abril de 2026','1417.49'],
    [bm,'MKT Magazzi 2','317155313215000','02 de abril de 2026','11091.77'],
    [bm,'MKT Magazzi 2','317155313215000','02 de abril de 2026','2737.09'],
    [bm,'MKT Magazzi 2','317155313215000','03 de abril de 2026','9151.03'],
    [bm,'MKT Magazzi 2','317155313215000','03 de abril de 2026','9098.22'],
    [bm,'MKT Magazzi 2','317155313215000','03 de abril de 2026','8948.26'],
    // Magazzi 5
    [bm,'MKT Magazzi 5','323722022685595','30 de março de 2026','3416.68'],
    [bm,'MKT Magazzi 5','323722022685595','30 de março de 2026','4057.55'],
    [bm,'MKT Magazzi 5','323722022685595','30 de março de 2026','7578.88'],
    [bm,'MKT Magazzi 5','323722022685595','30 de março de 2026','3416.26'],
    [bm,'MKT Magazzi 5','323722022685595','01 de abril de 2026','8698.40'],
    [bm,'MKT Magazzi 5','323722022685595','02 de abril de 2026','4861.70'],
    [bm,'MKT Magazzi 5','323722022685595','02 de abril de 2026','2000.00'],
    [bm,'MKT Magazzi 5','323722022685595','02 de abril de 2026','5623.33'],
    [bm,'MKT Magazzi 5','323722022685595','02 de abril de 2026','3423.03'],
    [bm,'MKT Magazzi 5','323722022685595','03 de abril de 2026','19668.03'],
    // Central Ar Condicionado
    ['CENTRAL AR CONDICIONADO','Conta 03','1777715883149134','03 de abril de 2026','5265.55'],
    // 04 de abril
    [bm,'MKT Magazzi 4','165145608890100','04 de abril de 2026','9021.61'],
    [bm,'MKT Magazzi 2','317155313215000','04 de abril de 2026','9585.71'],
    ['CENTRAL AR CONDICIONADO','Conta 03','1777715883149134','04 de abril de 2026','3685.79'],
  ];
  return rows.map(([bm,contaNome,contaId,date,valor]) => ({
    id: uid(), bm, contaNome, contaId,
    date, dk: dateKey(date), valor: parseFloat(valor)
  }));
}

if (!records) { records = seedData(); persist(); }

// ─── Parse paste ─────────────────────────────────────────
function parsePaste() {
  const raw = document.getElementById('pasteRaw').value.trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
  let bm='', contaNome='', contaId='';
  const pairs = [];
  let curDate = '';

  for (const line of lines) {
    if (/^BM\s*[-–]/i.test(line)) { bm=line; continue; }
    if (/conta de anúncios/i.test(line)) continue;
    if (/total/i.test(line)) continue;
    const dm = line.match(/^(\d{1,2})\s+de\s+\w+\s+de\s+\d{4}$/i);
    if (dm) { curDate=line; continue; }
    const vm = line.match(/[R$\*\s]*([\d.,]+)$/);
    if (vm && curDate) { pairs.push({date:curDate, valor:vm[1].replace(/\./g,'').replace(',','.')}); continue; }
    const im = line.match(/\((\d{10,20})\)/);
    if (im) { contaId=im[1]; contaNome=line.replace(/\s*\(\d{10,20}\)/,'').trim(); continue; }
    if (!contaNome && line.length>3 && !/^\d/.test(line)) contaNome=line;
  }

  if (bm) document.getElementById('fBM').value=bm;
  if (contaNome) document.getElementById('fConta').value=contaNome;
  if (contaId) document.getElementById('fID').value=contaId;

  const container = document.getElementById('valRows');
  container.innerHTML='';
  pairs.forEach(p => addValRow(p.date, p.valor));
  if (pairs.length===0) addValRow();
}

// ─── Val rows in modal ────────────────────────────────────
function addValRow(date='', valor='') {
  const id = uid();
  const div = document.createElement('div');
  div.className = 'val-row';
  div.id = 'vr-'+id;
  div.innerHTML = `
    <input type="text" placeholder="29 de março de 2026" value="${date}" class="vr-date">
    <input type="text" placeholder="13.204,64" value="${valor}" class="vr-val" style="max-width:130px">
    <button class="btn btn-xs btn-ghost" onclick="document.getElementById('vr-${id}').remove()">✕</button>
  `;
  document.getElementById('valRows').appendChild(div);
}

// ─── Modal open/close ─────────────────────────────────────
let editIds = [];
function openModal(ids) {
  editIds = ids||[];
  document.getElementById('pasteRaw').value='';
  document.getElementById('fBM').value='';
  document.getElementById('fConta').value='';
  document.getElementById('fID').value='';
  document.getElementById('valRows').innerHTML='';
  document.getElementById('mtitle').textContent = ids ? 'Editar cobranças' : 'Nova cobrança';

  if (ids && ids.length) {
    const first = records.find(r=>r.id===ids[0]);
    if (first) {
      document.getElementById('fBM').value=first.bm;
      document.getElementById('fConta').value=first.contaNome;
      document.getElementById('fID').value=first.contaId;
      ids.forEach(id => {
        const r = records.find(x=>x.id===id);
        if(r) addValRow(r.date, r.valor.toFixed(2).replace('.',','));
      });
    }
  } else {
    addValRow();
  }
  document.getElementById('ov').classList.add('open');
}
function closeModal() { document.getElementById('ov').classList.remove('open'); }

function saveModal() {
  const bm = document.getElementById('fBM').value.trim();
  const contaNome = document.getElementById('fConta').value.trim();
  const contaId = document.getElementById('fID').value.trim();
  if (!contaNome && !bm) { alert('Preencha ao menos o nome da conta ou BM.'); return; }

  const rows = [...document.querySelectorAll('#valRows .val-row')];
  const newRecs = rows.map(row => ({
    id: uid(),
    bm, contaNome, contaId,
    date: row.querySelector('.vr-date').value.trim(),
    dk: dateKey(row.querySelector('.vr-date').value.trim()),
    valor: parseBRL(row.querySelector('.vr-val').value)
  })).filter(r => r.date && r.valor);

  if (!newRecs.length) { alert('Adicione ao menos uma data e valor.'); return; }

  if (editIds.length) {
    records = records.filter(r => !editIds.includes(r.id));
  }
  records.push(...newRecs);
  persist(); closeModal(); populateDropdowns(); render();
}

function deleteRecords(ids) {
  if (!confirm(`Remover ${ids.length} cobrança${ids.length>1?'s':''}?`)) return;
  records = records.filter(r => !ids.includes(r.id));
  persist(); populateDropdowns(); render();
}

// ─── Populate dropdowns ──────────────────────────────────
function populateDropdowns() {
  const selBM = document.getElementById('selBM');
  const selConta = document.getElementById('selConta');
  const curBM = selBM.value;
  const curConta = selConta.value;

  const bms = [...new Set(records.map(r => r.bm))].sort();
  selBM.innerHTML = '<option value="">Todas as empresas</option>' +
    bms.map(b => `<option value="${b}" ${b===curBM?'selected':''}>${b}</option>`).join('');

  const filteredBM = curBM ? records.filter(r => r.bm === curBM) : records;
  const contas = [...new Map(filteredBM.map(r => [r.contaId||r.contaNome, r.contaNome])).entries()]
    .sort((a,b) => a[1].localeCompare(b[1]));
  selConta.innerHTML = '<option value="">Todas as contas</option>' +
    contas.map(([id, nome]) => `<option value="${id}" ${id===curConta?'selected':''}>${nome}</option>`).join('');
}

function onBMChange() {
  // Reset conta when BM changes
  document.getElementById('selConta').value = '';
  populateDropdowns();
  render();
}

// ─── Date filter state ───────────────────────────────────
let activeChip = 'all';

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function offsetKey(days) {
  const d = new Date(); d.setDate(d.getDate() - days);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function setChip(val, el) {
  activeChip = val;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const cr = document.getElementById('customRange');
  cr.style.display = val === 'custom' ? 'flex' : 'none';
  render();
}

function getDateRange() {
  const t = todayKey();
  if (activeChip === 'all')       return { from: '0000-00-00', to: '9999-99-99' };
  if (activeChip === 'today')     return { from: t, to: t };
  if (activeChip === 'yesterday') { const y = offsetKey(1); return { from: y, to: y }; }
  if (activeChip === '7d')        return { from: offsetKey(6), to: t };
  if (activeChip === '30d')       return { from: offsetKey(29), to: t };
  if (activeChip === 'custom') {
    const f = document.getElementById('dtFrom').value || '0000-00-00';
    const to = document.getElementById('dtTo').value || '9999-99-99';
    return { from: f, to: to };
  }
  return { from: '0000-00-00', to: '9999-99-99' };
}

// ─── Render ──────────────────────────────────────────────
function render() {
  const q = document.getElementById('q').value.toLowerCase();
  const selBM = document.getElementById('selBM').value;
  const selConta = document.getElementById('selConta').value;
  const { from, to } = getDateRange();

  const filtered = records.filter(r => {
    const matchQ = !q || [r.bm,r.contaNome,r.contaId].join(' ').toLowerCase().includes(q);
    const matchD = r.dk >= from && r.dk <= to;
    const matchBM = !selBM || r.bm === selBM;
    const matchConta = !selConta || (r.contaId||r.contaNome) === selConta;
    return matchQ && matchD && matchBM && matchConta;
  });

  // Summary
  const total = filtered.reduce((s,r)=>s+r.valor,0);
  const days  = [...new Set(filtered.map(r=>r.dk))].length;
  const accts = [...new Set(filtered.map(r=>r.contaId||r.contaNome))].length;
  document.getElementById('sumGrid').innerHTML = `
    <div class="sum-card"><div class="sum-lbl">Total geral pago</div><div class="sum-val g">${fmtBRL(total)}</div><div class="sum-sub">${filtered.length} cobranças</div></div>
    <div class="sum-card"><div class="sum-lbl">Contas</div><div class="sum-val b">${accts}</div><div class="sum-sub">contas de anúncios</div></div>
    <div class="sum-card"><div class="sum-lbl">Dias</div><div class="sum-val y">${days}</div><div class="sum-sub">dias distintos</div></div>
  `;

  // Filter result bar
  const chipLabels = {all:'Todos os registros',today:'Hoje',yesterday:'Ontem','7d':'Últimos 7 dias','30d':'Últimos 30 dias',custom:'Período personalizado'};
  const periodLabel = chipLabels[activeChip] || 'Período';
  const frEl = document.getElementById('filterResult');
  if (activeChip === 'all' && !q) {
    frEl.style.display = 'none';
  } else {
    frEl.style.display = 'flex';
    frEl.innerHTML = `
      <div class="fr-item"><div class="fr-lbl">Período</div><div class="fr-sub" style="font-size:12px;color:var(--text)">${periodLabel}</div></div>
      <div class="fr-divider"></div>
      <div class="fr-item"><div class="fr-lbl">Total pago no período</div><div class="fr-val">${fmtBRL(total)}</div></div>
      <div class="fr-divider"></div>
      <div class="fr-item"><div class="fr-lbl">Cobranças</div><div class="fr-sub" style="font-size:13px;color:var(--text);font-weight:600">${filtered.length}</div></div>
      <div class="fr-divider"></div>
      <div class="fr-item"><div class="fr-lbl">Dias</div><div class="fr-sub" style="font-size:13px;color:var(--text);font-weight:600">${days}</div></div>
    `;
  }

  document.getElementById('tcnt').textContent = q ? `${filtered.length} resultado${filtered.length!==1?'s':''}` : '';

  if (!filtered.length) {
    document.getElementById('body').innerHTML=`<div class="empty">Nenhum registro.<br>Clique em <b>+ Adicionar</b> para começar.</div>`;
    return;
  }

  // Group by day
  const dayMap = {};
  filtered.forEach(r => {
    if (!dayMap[r.dk]) dayMap[r.dk]={dk:r.dk, date:r.date, recs:[]};
    dayMap[r.dk].recs.push(r);
  });
  const dayList = Object.values(dayMap).sort((a,b)=>a.dk.localeCompare(b.dk));

  let html='';
  dayList.forEach((day, di) => {
    const dayTotal = day.recs.reduce((s,r)=>s+r.valor,0);

    // Group by account within day
    const acctMap = {};
    day.recs.forEach(r => {
      const ak = r.contaId||r.contaNome;
      if (!acctMap[ak]) acctMap[ak]={bm:r.bm, nome:r.contaNome, id:r.contaId, recs:[]};
      acctMap[ak].recs.push(r);
    });
    const acctList = Object.values(acctMap);

    html += `
      <div class="day-block">
        <div class="day-hdr">
          <div class="day-hdr-l">
            <span class="day-pill">📅 ${day.date}</span>
            <span class="day-meta">${day.recs.length} cobrança${day.recs.length!==1?'s':''} · ${acctList.length} conta${acctList.length!==1?'s':''}</span>
          </div>
          <div>
            <span class="day-total-lbl">Total do dia</span>
            <span class="day-total">${fmtBRL(dayTotal)}</span>
          </div>
        </div>
    `;

    acctList.forEach(acct => {
      const acctTotal = acct.recs.reduce((s,r)=>s+r.valor,0);
      const ids = acct.recs.map(r=>r.id);
      html += `
        <div class="acct-block">
          <div class="acct-hdr">
            <div class="acct-hdr-l">
              <span class="bm-tag" title="${acct.bm}">${acct.bm}</span>
              <div>
                <div class="acct-name">${acct.nome}</div>
                ${acct.id?`<div class="acct-id">(${acct.id})</div>`:''}
              </div>
            </div>
            <div class="acct-subtotal">
              <span class="acct-subtotal-lbl">Subtotal</span>
              ${fmtBRL(acctTotal)}
              <button class="btn btn-ghost btn-xs" onclick="openModal(${JSON.stringify(ids)})" title="Editar">✏️</button>
              <button class="btn btn-ghost btn-xs" onclick="deleteRecords(${JSON.stringify(ids)})" style="color:var(--red)" title="Remover">🗑</button>
            </div>
          </div>
          <div class="payments">
      `;

      acct.recs.forEach((r, ri) => {
        html += `
          <div class="pay-row">
            <div style="display:flex;align-items:center;gap:10px">
              <span class="pay-idx" style="color:var(--muted2);font-family:var(--mono);font-size:11px;min-width:18px">${ri+1}.</span>
              <span style="font-size:12px;color:var(--muted2);font-family:var(--mono)">📅</span>
              <span style="font-size:12px;font-family:var(--mono);color:var(--text)">${r.date}</span>
            </div>
            <span class="pay-val">${fmtBRL(r.valor)}</span>
          </div>
        `;
      });

      html += `</div></div>`;
    });

    html += `</div>`;
    if (di < dayList.length-1) html += `<hr class="day-sep">`;
  });

  // Grand total bar
  html += `
    <div class="grand-total-bar">
      <div>
        <div class="sum-lbl" style="margin-bottom:4px">Total geral — todas as contas</div>
        <div style="font-size:12px;color:var(--muted2);font-family:var(--mono)">${dayList.length} dias · ${filtered.length} cobranças</div>
      </div>
      <div class="grand-total-val">${fmtBRL(total)}</div>
    </div>
  `;

  document.getElementById('body').innerHTML = html;
}

// ─── Export ──────────────────────────────────────────────
function exportCSV() {
  const rows=[['Data','BM','Conta','ID','Valor (R$)']];
  [...records].sort((a,b)=>a.dk.localeCompare(b.dk))
    .forEach(r=>rows.push([r.date,r.bm,r.contaNome,r.contaId,r.valor.toFixed(2).replace('.',',')]));
  const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='contas-pagas-facebook.csv';
  a.click();
}

populateDropdowns();
render();
</script>
</body>
</html>
